{% extends "base.html" %}

{% block title %}Créer un Ticket - HelpDesk{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card-custom">
            <h1 class="h3 mb-3" style="font-weight: 700; color: var(--color-primary);" id="page-title">Créer un nouveau ticket</h1>
            <p class="text-muted mb-4">Décrivez précisément votre problème afin qu'un administrateur puisse vous répondre rapidement.</p>
            
            <form id="create-ticket-form" action="{{ url_for('main.create_ticket') }}" method="POST">
                <div class="mb-3">
                    <label for="title" class="form-label">Titre / Sujet du problème</label>
                    <input type="text" class="form-control" id="title" name="title" placeholder="Ex: VPN inaccessible, Écran noir, etc." required>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="category" class="form-label">Catégorie</label>
                        <select class="form-select" id="category" name="category" required>
                            <option value="" disabled selected>Choisissez une catégorie</option>
                            <option value="Réseau">Réseau (WiFi, VPN, Internet)</option>
                            <option value="Matériel">Matériel (PC, Écran, Imprimante)</option>
                            <option value="Logiciel">Logiciel (Outlook, Suite Office, OS)</option>
                            <option value="Compte utilisateur">Compte utilisateur (Identifiants, Mot de passe bloqué)</option>
                            <option value="Autre">Autre problème</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="priority" class="form-label">Priorité estimée</label>
                        <select class="form-select" id="priority" name="priority" required>
                            <option value="Faible">Faible (Demande non urgente)</option>
                            <option value="Moyenne" selected>Moyenne (Problème modéré)</option>
                            <option value="Haute">Haute (Gêne majeure pour travailler)</option>
                            <option value="Urgente">Urgente (Activité complètement bloquée)</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="description" class="form-label">Description détaillée</label>
                    <textarea class="form-control" id="description" name="description" rows="6" placeholder="Indiquez ici les détails du problème, les messages d'erreur affichés et les étapes pour le reproduire..." required></textarea>
                </div>
                
                <div class="d-flex gap-3 justify-content-end">
                    <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary-custom">Annuler</a>
                    <button type="submit" id="btn-submit-ticket" class="btn btn-primary-custom">Soumettre le ticket</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
