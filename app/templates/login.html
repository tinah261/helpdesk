{% extends "base.html" %}

{% block title %}Connexion - HelpDesk{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card-custom">
            <h1 class="h3 mb-3 text-center" style="font-weight: 700; color: var(--color-primary);" id="page-title">Connexion</h1>
            <p class="text-muted text-center mb-4">Accédez à votre espace HelpDesk</p>
            
            <form id="login-form" action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label">Adresse Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="admin@helpdesk.local" required autocomplete="email">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Mot de passe</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" id="btn-submit-login" class="btn btn-primary-custom w-100 mt-2">Se connecter</button>
            </form>
            
            <hr class="my-4">
            <p class="text-center mb-0 text-muted">
                Pas encore de compte ? <a href="{{ url_for('auth.register') }}" id="link-register">Créer un compte</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
