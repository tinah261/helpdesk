services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: helpdesk_db
      POSTGRES_USER: helpdesk_user
      POSTGRES_PASSWORD: helpdesk_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk_user -d helpdesk_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - helpdesk-net

  app:
    build: .
    container_name: app
    command: sh -c "python init_db.py && gunicorn --bind 0.0.0.0:80 --workers 4 app.app:app"
    environment:
      - DATABASE_URL=postgresql://helpdesk_user:helpdesk_password@postgres:5432/helpdesk_db
      - SECRET_KEY=helpdesk-super-secret-key-prod-987654321
      - FLASK_ENV=production
      - APP_VERSION=1.0.0
      - APP_MESSAGE=Application HelpDesk déployée automatiquement avec Jenkins
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "80"
    networks:
      - helpdesk-net
    restart: always

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - helpdesk-net
    restart: always

volumes:
  postgres_data:

networks:
  helpdesk-net:
    driver: bridge